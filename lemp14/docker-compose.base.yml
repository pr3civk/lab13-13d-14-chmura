# PAwChO - Laboratorium 14 - plik BAZOWY (mechanizm merge)
# Definiuje tylko te skladniki aplikacji, ktore sa TAKIE SAME we wszystkich
# srodowiskach. Ustawienia specyficzne dla srodowiska (publikowane porty)
# zostaly przeniesione do pliku override: docker-compose.override.yml.
#
# Uruchomienie (scalenie base + override):
#   docker compose -f docker-compose.base.yml -f docker-compose.override.yml up -d --build
services:

  nginx:
    image: nginx:1.27-alpine
    container_name: lemp_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html:ro
    depends_on:
      - php
    networks:
      - frontend
      - backend
    restart: unless-stopped

  php:
    build: ./php
    image: lemp-php:8.3-fpm
    container_name: lemp_php
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: lempdb
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    networks:
      - backend
    secrets:
      - mysql_user
      - mysql_password
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: lemp_mysql
    environment:
      MYSQL_DATABASE: lempdb
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend
    secrets:
      - mysql_root_password
      - mysql_user
      - mysql_password
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: lemp_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      - mysql
    networks:
      - backend
    restart: unless-stopped

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt
  mysql_user:
    file: ./secrets/mysql_user.txt

volumes:
  db_data:

networks:
  frontend:
  backend:
